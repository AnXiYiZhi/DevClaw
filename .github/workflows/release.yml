name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
          - os: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync version from tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing version: $VERSION"
          python -c "
          from pathlib import Path
          import re, json

          version = '$VERSION'

          # src-tauri/Cargo.toml
          cargo = Path('src-tauri/Cargo.toml')
          cargo.write_text(
              re.sub(r'^version\s*=\s*\".*?\"', f'version = \"{version}\"', cargo.read_text(encoding='utf-8'), count=1, flags=re.MULTILINE),
              encoding='utf-8'
          )

          # package.json
          pkg = Path('package.json')
          data = json.loads(pkg.read_text(encoding='utf-8'))
          data['version'] = version
          pkg.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')

          # src-tauri/tauri.conf.json
          conf = Path('src-tauri/tauri.conf.json')
          data = json.loads(conf.read_text(encoding='utf-8'))
          data['version'] = version
          conf.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          "
          echo "Done. Verifying:"
          grep '^version' src-tauri/Cargo.toml
          python -c "import json; print(json.load(open('package.json'))['version'])"
          python -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App (macOS)
        if: runner.os == 'macOS'
        shell: bash
        timeout-minutes: 60
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: |
          set -euo pipefail
          pnpm tauri build --target universal-apple-darwin

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        run: pnpm tauri build

      - name: Prepare macOS Assets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"  # e.g., v3.5.0

          # Locate .app bundle
          APP_PATH=""
          for path in \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/release/bundle/macos"; do
            if [ -d "$path" ]; then
              [ -z "$APP_PATH" ] && APP_PATH=$(find "$path" -maxdepth 1 -name "*.app" -type d | head -1 || true)
            fi
          done

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found" >&2
            exit 1
          fi

          # 1) Collect .app as zip
          NEW_ZIP="DevClaw-${VERSION}-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-assets/$NEW_ZIP"
          echo "macOS zip ready: $NEW_ZIP"

          # 2) Create styled DMG with create-dmg
          HOMEBREW_NO_AUTO_UPDATE=1 brew install create-dmg
          NEW_DMG="DevClaw-${VERSION}-macOS.dmg"
          DMG_STAGE_DIR="$RUNNER_TEMP/dmg-stage"
          rm -rf "$DMG_STAGE_DIR"
          mkdir -p "$DMG_STAGE_DIR"
          ditto "$APP_PATH" "$DMG_STAGE_DIR/DevClaw.app"

          create-dmg \
            --volname "DevClaw" \
            --background "src-tauri/icons/dmg-background.png" \
            --window-size 660 400 \
            --window-pos 200 120 \
            --icon-size 80 \
            --icon "DevClaw.app" 180 220 \
            --hide-extension "DevClaw.app" \
            --app-drop-link 480 220 \
            --no-internet-enable \
            "release-assets/$NEW_DMG" \
            "$DMG_STAGE_DIR"

          rm -rf "$DMG_STAGE_DIR"
          echo "✅ Styled DMG created: $NEW_DMG"

      - name: Prepare Windows Assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $VERSION = $env:GITHUB_REF_NAME  # e.g., v3.5.0
          # 仅打包 MSI 安装器 + .sig（用于 Updater）
          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle/msi' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $msi) {
            # 兜底：全局搜索 .msi
            $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -ne $msi) {
            $dest = "DevClaw-$VERSION-Windows.msi"
            Copy-Item $msi.FullName (Join-Path release-assets $dest)
            Write-Host "Installer copied: $dest"
            $sigPath = "$($msi.FullName).sig"
            if (Test-Path $sigPath) {
              Copy-Item $sigPath (Join-Path release-assets ("$dest.sig"))
              Write-Host "Signature copied: $dest.sig"
            } else {
              Write-Warning "Signature not found for $($msi.Name)"
            }
          } else {
            Write-Warning 'No Windows MSI installer found'
          }
          # 绿色版（portable）：仅可执行文件打 zip（不参与 Updater）
          $exeCandidates = @(
            'src-tauri/target/release/devclaw.exe',
            'src-tauri/target/x86_64-pc-windows-msvc/release/devclaw.exe'
          )
          $exePath = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($null -ne $exePath) {
            $portableDir = 'release-assets/DevClaw-Portable'
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            Copy-Item $exePath $portableDir
            $portableIniPath = Join-Path $portableDir 'portable.ini'
            $portableContent = @(
              '# DevClaw portable build marker',
              'portable=true'
            )
            $portableContent | Set-Content -Path $portableIniPath -Encoding UTF8
            $portableZip = "release-assets/DevClaw-$VERSION-Windows-Portable.zip"
            Compress-Archive -Path "$portableDir/*" -DestinationPath $portableZip -Force
            Remove-Item -Recurse -Force $portableDir
            Write-Host "Windows portable zip created: DevClaw-$VERSION-Windows-Portable.zip"
          } else {
            Write-Warning 'Portable exe not found'
          }

      - name: List prepared assets
        shell: bash
        run: |
          ls -la release-assets || true

      - name: Collect Signatures
        shell: bash
        run: |
          set -euo pipefail
          echo "Collected signatures (if any alongside artifacts):"
          ls -la release-assets/*.sig || echo "No signatures found"

      - name: Upload release artifacts to workflow
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ runner.os }}-${{ matrix.arch || runner.arch }}
          path: release-assets/*
          if-no-files-found: error

      - name: List generated bundles (debug)
        if: always()
        shell: bash
        run: |
          echo "Listing bundles in src-tauri/target..."
          find src-tauri/target -maxdepth 4 -type f -name "*.*" 2>/dev/null || true

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: release
    permissions:
      contents: write
    steps:
      - name: Download built release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded release artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -la release-assets

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: DevClaw ${{ github.ref_name }}
          prerelease: false
          body: |
            ## DevClaw ${{ github.ref_name }}

            🌐 **Only Official Website / 唯一官方网站 / 唯一の公式サイト**: [devclaw.cc.cd](https://devclaw.cc.cd)

            Claude Code 供应商切换工具

            ### 下载

            - **macOS**: `DevClaw-${{ github.ref_name }}-macOS.dmg`（推荐）或 `DevClaw-${{ github.ref_name }}-macOS.zip`（解压即用）
            - **Windows**: `DevClaw-${{ github.ref_name }}-Windows.msi`（安装版）或 `DevClaw-${{ github.ref_name }}-Windows-Portable.zip`（绿色版）
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  assemble-latest-json:
    name: Assemble latest.json
    runs-on: ubuntu-22.04
    needs: publish-release
    permissions:
      contents: write
    steps:
      - name: Prepare GH
        run: |
          gh --version || (type -p curl >/dev/null && sudo apt-get update && sudo apt-get install -y gh || true)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dl
          gh release download "$TAG" --dir dl --repo "$GITHUB_REPOSITORY"
          ls -la dl || true
      - name: Generate latest.json
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          base_url="https://github.com/$REPO/releases/download/$TAG"
          # 初始化空平台映射
          mac_url=""; mac_sig=""
          win_url=""; win_sig=""
          shopt -s nullglob
          for sig in dl/*.sig; do
            base=${sig%.sig}
            fname=$(basename "$base")
            url="$base_url/$fname"
            sig_content=$(cat "$sig")
            case "$fname" in
              *.tar.gz)
                # 视为 macOS updater artifact
                mac_url="$url"; mac_sig="$sig_content";;
              *.msi|*.exe)
                win_url="$url"; win_sig="$sig_content";;
            esac
          done
          # 构造 JSON（仅包含存在的目标）
          tmp_json=$(mktemp)
          {
            echo '{'
            echo "  \"version\": \"$VERSION\",";
            echo "  \"notes\": \"Release $TAG\",";
            echo "  \"pub_date\": \"$PUB_DATE\",";
            echo '  "platforms": {'
            first=1
            if [ -n "$mac_url" ] && [ -n "$mac_sig" ]; then
              for key in darwin-aarch64 darwin-x86_64; do
                [ $first -eq 0 ] && echo ','
                echo "    \"$key\": {\"signature\": \"$mac_sig\", \"url\": \"$mac_url\"}"
                first=0
              done
            fi
            if [ -n "$win_url" ] && [ -n "$win_sig" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"windows-x86_64\": {\"signature\": \"$win_sig\", \"url\": \"$win_url\"}"
              first=0
            fi
            echo '  }'
            echo '}'
          } > "$tmp_json"
          echo "Generated latest.json:" && cat "$tmp_json"
          mv "$tmp_json" latest.json
      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          gh release upload "$GITHUB_REF_NAME" latest.json --clobber --repo "$GITHUB_REPOSITORY"

  publish-gitee:
    name: Publish to Gitee
    runs-on: ubuntu-22.04
    needs: publish-release
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      GITEE_REPO: ${{ secrets.GITEE_REPO }}
    steps:
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dl
          gh release download "$TAG" --dir dl --repo "$GITHUB_REPOSITORY"
          ls -la dl

      - name: Create Gitee release
        id: create_release
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          OWNER="${GITEE_REPO%%/*}"
          REPO="${GITEE_REPO#*/}"

          # Create release — access_token must be a query parameter, NOT inside JSON body
          HTTP_CODE=$(curl -s -w "\n%{http_code}" -o /tmp/gitee_response.json \
            -X POST "https://gitee.com/api/v5/repos/${GITEE_REPO}/releases?access_token=${GITEE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"DevClaw ${TAG}\",
              \"body\": \"Release ${TAG}\",
              \"prerelease\": false
            }")

          echo "HTTP status: ${HTTP_CODE}"
          echo "Response body:"
          cat /tmp/gitee_response.json

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "::error::Gitee create release failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

          RELEASE_ID=$(python3 -c "import json; print(json.load(open('/tmp/gitee_response.json'))['id'])")
          echo "release_id=${RELEASE_ID}" >> $GITHUB_OUTPUT
          echo "Gitee release created: ${RELEASE_ID}"

      - name: Upload assets to Gitee
        run: |
          set -euxo pipefail
          RELEASE_ID="${{ steps.create_release.outputs.release_id }}"

          for f in dl/*; do
            [ -f "$f" ] || continue
            FILENAME=$(basename "$f")
            echo "Uploading $FILENAME to Gitee..."

            HTTP_CODE=$(curl -s -w "\n%{http_code}" -o /tmp/gitee_upload_response.json \
              -X POST "https://gitee.com/api/v5/repos/${GITEE_REPO}/releases/${RELEASE_ID}/attach_files?access_token=${GITEE_TOKEN}" \
              -H "Content-Type: multipart/form-data" \
              -F "file=@${f}")

            echo "HTTP status: ${HTTP_CODE}"
            cat /tmp/gitee_upload_response.json

            if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
              echo "::error::Failed to upload ${FILENAME} (HTTP ${HTTP_CODE})"
              exit 1
            fi

            DOWNLOAD_URL=$(python3 -c "import json; print(json.load(open('/tmp/gitee_upload_response.json')).get('browser_download_url','N/A'))")
            echo "Uploaded: ${DOWNLOAD_URL}"
          done
          echo "All assets uploaded to Gitee"

  upload-to-worker:
    name: Upload to DevClawWorker
    runs-on: ubuntu-22.04
    needs: publish-release
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dl
          gh release download "$TAG" --dir dl --repo "$GITHUB_REPOSITORY" \
            --pattern "*Portable*" --pattern "*.dmg"
          ls -la dl

      - name: Upload Windows Portable ZIP
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP=$(find dl -name "*Portable*.zip" | head -1)
          if [ -z "$ZIP" ]; then
            echo "No portable zip found, skipping"
            exit 0
          fi
          echo "Uploading $ZIP as version $VERSION..."
          curl -f -X POST "https://devclaw.ccwu.cc/api/upload/windows?version=${VERSION}" \
            -H "Authorization: Bearer ${{ secrets.DEVCLAWWORKER_UPLOAD_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary "@${ZIP}"
          echo "Windows upload done"

      - name: Upload macOS DMG
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DMG=$(find dl -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "No DMG found, skipping"
            exit 0
          fi
          echo "Uploading $DMG as version $VERSION..."
          curl -f -X POST "https://devclaw.ccwu.cc/api/upload/macos?version=${VERSION}" \
            -H "Authorization: Bearer ${{ secrets.DEVCLAWWORKER_UPLOAD_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@${DMG}"
          echo "macOS upload done"
